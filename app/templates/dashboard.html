<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дневник | Трекер эмоций</title>
    
    <!-- Font Import -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Tailwind Configuration -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            bg: '#F9FAFB',
                            sage: '#A7B5A7',
                            sageDark: '#7A8C7A',
                            sand: '#EDE6DD',
                            sky: '#E3EDF5',
                            heading: '#1F2937',
                            muted: '#6B7280'
                        }
                    },
                    boxShadow: {
                        'soft': '0 10px 40px -10px rgba(0,0,0,0.08)',
                        'card': '0 4px 6px -1px rgba(0, 0, 0, 0.02), 0 2px 4px -1px rgba(0, 0, 0, 0.02)',
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #FCFBFA;
            min-height: 100vh;
        }

        /* Custom Range Slider Styling */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: #ffffff;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            cursor: pointer;
            margin-top: -9px; 
            transition: transform 0.1s;
        }

        input[type=range]::-webkit-slider-thumb:hover {
            transform: scale(1.1);
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            cursor: pointer;
            background: #E5E7EB;
            border-radius: 4px;
        }

        .blob-bg {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            z-index: -1;
            animation: float 10s infinite ease-in-out alternate;
        }
        
        @keyframes float {
            0% { transform: translate(0, 0); }
            100% { transform: translate(20px, -20px); }
        }

        .fade-in-up {
            animation: fadeInUp 0.6s ease-out forwards;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body class="flex flex-col overflow-hidden relative text-gray-800 font-sans">

    <!-- Background Elements -->
    <div class="fixed top-0 left-0 w-full h-full overflow-hidden -z-10">
        <div class="blob-bg bg-brand-sky/30 w-[500px] h-[500px] top-[-10%] left-[-10%]"></div>
        <div class="blob-bg bg-brand-sage/20 w-[400px] h-[400px] bottom-[10%] right-[-5%]"></div>
    </div>

    <!-- Navigation / Top Bar -->
    <nav class="w-full px-6 py-5 flex items-center justify-between max-w-5xl mx-auto w-full z-10">
        <div class="flex items-center gap-3">
            <div class="w-9 h-9 rounded-full bg-brand-sky flex items-center justify-center text-brand-sageDark font-bold">T</div>
            <span class="font-semibold text-lg tracking-tight text-gray-800">Трекер эмоций</span>
        </div>
        <div class="flex items-center gap-4">
            <a href="dashboard.html" class="text-sm font-medium text-brand-heading hover:text-brand-sageDark transition-colors">Дневник</a>
            <a href="analytics.html" class="text-sm font-medium text-gray-500 hover:text-brand-sageDark transition-colors">Аналитика</a>
            <a href="settings.html" class="text-sm font-medium text-gray-500 hover:text-brand-sageDark transition-colors">Настройки</a>
            <button onclick="logout()" class="text-sm font-medium text-gray-400 hover:text-red-400 transition-colors ml-2">Выйти</button>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main class="flex-1 flex flex-col justify-center items-center w-full max-w-2xl mx-auto px-6 pb-12 z-10">
        
        <!-- Header -->
        <header class="text-center mb-10 fade-in-up">
            <h1 class="text-3xl font-light text-gray-900 mb-2 tracking-tight">Как вы себя чувствуете сегодня?</h1>
            <p class="text-sm text-gray-500">Отвечайте честно и быстро</p>
        </header>

        <!-- Input Card -->
        <div class="w-full bg-white/80 backdrop-blur-xl rounded-[2rem] shadow-soft p-6 md:p-8 space-y-8 border border-white/50 fade-in-up" style="animation-delay: 0.1s;">
            
            <!-- Mood Slider -->
            <div class="space-y-3 group">
                <div class="flex justify-between items-end">
                    <label class="flex items-center gap-2 text-sm font-medium text-gray-700">
                        <svg class="w-5 h-5 text-brand-sage" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        Настроение
                    </label>
                    <span id="value-mood" class="text-lg font-bold text-brand-heading">5</span>
                </div>
                <input type="range" id="mood" min="1" max="10" value="5" class="w-full mt-2" oninput="updateValue('mood', this.value)" aria-label="Настроение от 1 до 10">
                <div class="flex justify-between text-xs text-gray-300 font-medium">
                    <span>😞 Плохо</span>
                    <span>😊 Отлично</span>
                </div>
            </div>

            <!-- Anxiety Slider -->
            <div class="space-y-3 group">
                <div class="flex justify-between items-end">
                    <label class="flex items-center gap-2 text-sm font-medium text-gray-700">
                        <svg class="w-5 h-5 text-blue-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                        Тревожность
                    </label>
                    <span id="value-anxiety" class="text-lg font-bold text-brand-heading">3</span>
                </div>
                <input type="range" id="anxiety" min="1" max="10" value="3" class="w-full mt-2" oninput="updateValue('anxiety', this.value)" aria-label="Уровень тревожности от 1 до 10">
                <div class="flex justify-between text-xs text-gray-300 font-medium">
                    <span>🍃 Спокойно</span>
                    <span>🌪 Сильно</span>
                </div>
            </div>

            <!-- Fatigue Slider -->
            <div class="space-y-3 group">
                <div class="flex justify-between items-end">
                    <label class="flex items-center gap-2 text-sm font-medium text-gray-700">
                        <svg class="w-5 h-5 text-yellow-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                        Усталость
                    </label>
                    <span id="value-fatigue" class="text-lg font-bold text-brand-heading">6</span>
                </div>
                <input type="range" id="fatigue" min="1" max="10" value="6" class="w-full mt-2" oninput="updateValue('fatigue', this.value)" aria-label="Уровень усталости от 1 до 10">
                <div class="flex justify-between text-xs text-gray-300 font-medium">
                    <span>🔋 Полные сил</span>
                    <span>⚡️ Разбитый</span>
                </div>
            </div>

            <!-- Sleep Hours (Optional) -->
            <div class="space-y-3 group pt-4 border-t border-gray-100">
                <div class="flex justify-between items-end">
                    <label class="flex items-center gap-2 text-sm font-medium text-gray-700">
                        <svg class="w-5 h-5 text-purple-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                        Сон (часов)
                    </label>
                    <span id="value-sleep" class="text-lg font-bold text-brand-heading">7.5</span>
                </div>
                <input type="range" id="sleep" min="0" max="12" step="0.5" value="7.5" class="w-full mt-2" oninput="updateValue('sleep', this.value)" aria-label="Количество сна в часах">
                <div class="flex justify-between text-xs text-gray-300 font-medium">
                    <span>😴 Мало</span>
                    <span>💤 Много</span>
                </div>
            </div>

            <!-- Note (Optional) -->
            <div class="space-y-3 pt-4 border-t border-gray-100">
                <label class="flex items-center gap-2 text-sm font-medium text-gray-700">
                    <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                    Заметка (необязательно)
                </label>
                <textarea id="note" rows="3" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-brand-sky focus:border-transparent transition-all duration-200 resize-none" placeholder="Что вы чувствовали сегодня?"></textarea>
            </div>

        </div>

        <!-- Action Button -->
        <div class="w-full mt-10 fade-in-up" style="animation-delay: 0.2s;">
            <button onclick="saveRecord()" class="w-full py-5 rounded-2xl bg-brand-heading text-white font-medium text-lg shadow-lg shadow-gray-200 hover:-translate-y-1 hover:bg-gray-800 active:translate-y-0 transition-all duration-300 flex items-center justify-center gap-3">
                <svg class="w-5 h-5 opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                Сохранить запись
            </button>
        </div>

        <!-- Mini History Chart -->
        <div class="mt-12 w-full max-w-sm fade-in-up" style="animation-delay: 0.3s;">
            <div class="flex items-center justify-between mb-4 px-2">
                <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Моя статистика</h3>
                <span class="text-xs text-brand-sageDark font-medium">За неделю</span>
            </div>
            
            <!-- Simple SVG Line Chart Mockup -->
            <div class="relative h-24 w-full bg-white/40 rounded-xl border border-white shadow-inner p-4 backdrop-blur-sm">
                <svg class="w-full h-full" preserveAspectRatio="none" viewBox="0 0 200 80">
                    <!-- Grid lines -->
                    <line x1="0" y1="20" x2="200" y2="20" stroke="#E5E7EB" stroke-width="1" stroke-dasharray="4 2" />
                    <line x1="0" y1="40" x2="200" y2="40" stroke="#E5E7EB" stroke-width="1" stroke-dasharray="4 2" />
                    <line x1="0" y1="60" x2="200" y2="60" stroke="#E5E7EB" stroke-width="1" stroke-dasharray="4 2" />
                    
                    <!-- Data Line -->
                    <polyline points="0,60 35,55 70,30 105,45 140,20 175,25 200,15" fill="none" stroke="#A7B5A7" stroke-width="3" vector-effect="non-scaling-stroke" strokeLinecap="round" strokeLinejoin="round"/>
                    
                    <!-- Area Gradient -->
                    <defs>
                        <linearGradient id="gradientArea" x1="0" x2="0" y1="0" y2="1">
                            <stop offset="0%" stop-color="#A7B5A7" stop-opacity="0.3"/>
                            <stop offset="100%" stop-color="#A7B5A7" stop-opacity="0"/>
                        </linearGradient>
                    </defs>
                    <polygon points="0,80 0,60 35,55 70,30 105,45 140,20 175,25 200,15 200,80" fill="url(#gradientArea)" />
                    
                    <!-- Active Dot -->
                    <circle cx="200" cy="15" r="4" fill="#1F2937" />
                </svg>
                
                <!-- Axis labels (Mockup) -->
                <div class="absolute bottom-1 left-1 flex justify-between w-full text-[9px] text-gray-300 font-medium">
                    <span>P</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span><span>Su</span>
                </div>
            </div>
        </div>
        
    </main>

    <!-- Success Toast Notification -->
    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-brand-heading text-white px-6 py-3 rounded-full shadow-lg transform translate-y-20 opacity-0 transition-all duration-300 z-50">
        <div class="flex items-center gap-3">
            <svg class="w-5 h-5 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
            <span class="text-sm font-medium">Запись сохранена!</span>
        </div>
    </div>

    <!-- Script for UI interaction -->
    <script>
        function updateValue(type, value) {
            // Update number display
            const displayId = `value-${type}`;
            const displayEl = document.getElementById(displayId);
            if (displayEl) {
                displayEl.textContent = value;
                
                // Optional: Add subtle animation to the number
                displayEl.classList.add('scale-110');
                setTimeout(() => displayEl.classList.remove('scale-110'), 100);
            }

            // Color feedback based on severity
            let colorClass = '';
            if (type === 'mood') {
                if(value < 4) colorClass = 'text-red-400';
                else if(value > 7) colorClass = 'text-green-500';
                else colorClass = 'text-blue-400';
            } else if (type === 'sleep') {
                if(value < 5) colorClass = 'text-orange-400';
                else if(value >= 7 && value <= 9) colorClass = 'text-green-500';
                else colorClass = 'text-blue-400';
            } else {
                // anxiety and fatigue
                if(value > 7) colorClass = 'text-red-400';
                else if(value > 4) colorClass = 'text-orange-400';
                else colorClass = 'text-green-500';
            }
            
            if(displayEl) displayEl.className = `text-lg font-bold ${colorClass}`;
        }

        function saveRecord() {
            // Mock save functionality
            const record = {
                mood: parseInt(document.getElementById('mood').value),
                anxiety: parseInt(document.getElementById('anxiety').value),
                fatigue: parseInt(document.getElementById('fatigue').value),
                sleep_hours: parseFloat(document.getElementById('sleep').value),
                note: document.getElementById('note').value,
                record_date: new Date().toISOString().split('T')[0]
            };

            console.log('Saving record:', record);
            
            // Show success toast
            const toast = document.getElementById('toast');
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 2000);

            // Reset form after save (optional)
            // document.getElementById('note').value = '';
        }

        function logout() {
            // Mock logout - redirect to login page
            window.location.href = 'login.html';
        }

        // Initialize color states on page load
        document.addEventListener('DOMContentLoaded', function() {
            updateValue('mood', document.getElementById('mood').value);
            updateValue('anxiety', document.getElementById('anxiety').value);
            updateValue('fatigue', document.getElementById('fatigue').value);
            updateValue('sleep', document.getElementById('sleep').value);
        });
    </script>
</body>
</html>
